name: Build and Publish Documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install sphinx sphinx-rtd-theme

      - name: Install GLE for gallery generation
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libpoppler-glib8t64 libglu1-mesa
          wget https://github.com/vlabella/GLE/releases/download/v4.3.9/gle-graphics-4.3.9-Linux.tar.gz
          tar -xzf gle-graphics-4.3.9-Linux.tar.gz
          # Find the extracted directory
          GLE_DIR=$(ls -d gle-graphics-* | head -n1)
          echo "Found GLE directory: $GLE_DIR"
          ls -la "$GLE_DIR"
          sudo cp -r "$GLE_DIR"/* /usr/local/
          export PATH="/usr/local/bin:$PATH"
          gle -v

      - name: Generate example gallery for documentation
        run: |
          # Build gleplot package first
          python -m pip install -e .
          
          mkdir -p docs/source/_static/gallery
          
          # Generate example outputs for documentation gallery
          echo "=== Generating example outputs for gallery ==="
          cd examples
          python run_and_compile.py
          
          # Copy generated PNG files to docs gallery directory
          if [ -d outputs ]; then
            echo "Copying PNG files to docs gallery..."
            cp outputs/example_*.png ../docs/source/_static/gallery/ 2>/dev/null || echo "No PNG files found to copy"
            echo "PNG files copied:"
            ls -lh ../docs/source/_static/gallery/*.png 2>/dev/null || echo "No PNG files in gallery"
          fi
          cd ..
          
          echo "Gallery images prepared in docs/source/_static/gallery/"

      - name: Build documentation
        run: |
          cd docs
          make clean
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/build/html'

  deploy:
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
