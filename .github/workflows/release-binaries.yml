name: Build and Attach Release Binaries

# RECONCILIATION NOTE
# -------------------
# gleplot's existing version.yml / release.yml (python-semantic-release) already
# push `v*` tags and create the semantic-release GitHub Release on pushes to main.
# THIS workflow reacts to that same `v*` tag purely to ATTACH the built desktop
# installers (Windows .exe, macOS arm64 .dmg) to that release.
# softprops/action-gh-release CREATES-OR-UPDATES the release for the tag, so it is
# safe whether or not the semantic-release release object already exists.
#
# It can also be run manually via workflow_dispatch (e.g. to (re)attach binaries
# to an existing tag/release). In that mode the version is taken from the optional
# `tag` input, and the release step is skipped unless a tag is supplied.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build for and attach binaries to (e.g. v1.2.0). Leave blank to build a version-only preview from pyproject without publishing a release."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm:
    name: Build macOS DMG (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: meta
        shell: bash
        run: |
          # On a tag push GITHUB_REF_NAME is the tag (e.g. v1.2.0). For a manual
          # run, prefer the `tag` input if given, else fall back to the pyproject
          # version. Strip any leading "v" so the version is bare (1.2.0).
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            RAW="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            RAW="${{ github.event.inputs.tag }}"
          else
            RAW=$(grep -E '^version = ' pyproject.toml | head -1 | sed 's/^version = "\(.*\)"/\1/')
          fi
          VERSION="${RAW#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Editable install first so copy_metadata("gleplot") in the spec finds
          # the dist-info. gui = PySide6; packaging = pyinstaller + Pillow +
          # dmgbuild (the latter carries a sys_platform == 'darwin' marker).
          pip install -e ".[gui,packaging]"

      - name: Generate macOS icon (.icns)
        shell: bash
        run: python packaging/macos_icon.py --icns build/icons/gleplot.icns

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}/build/icons/gleplot.icns
        shell: bash
        run: pyinstaller --clean --noconfirm packaging/gleplot.spec

      - name: Smoke-test packaged app
        shell: bash
        run: |
          test -x dist/gleplot.app/Contents/MacOS/gleplot
          dist/gleplot.app/Contents/MacOS/gleplot --smoke-test

      - name: Generate DMG background
        shell: bash
        run: python scripts/build_dmg_background.py --output build/dmg-bg.png

      - name: Build DMG
        env:
          GLEPLOT_APP_BUNDLE: ${{ github.workspace }}/dist/gleplot.app
          GLEPLOT_DMG_BACKGROUND: ${{ github.workspace }}/build/dmg-bg.png
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DMG_PATH="dist/gleplot-${VERSION}-macos-arm64.dmg"

          test -d dist/gleplot.app

          rm -f "$DMG_PATH"
          dmgbuild -s packaging/macos/dmg_settings.py "gleplot" "$DMG_PATH"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: gleplot-macos-arm64
          path: dist/gleplot-${{ steps.meta.outputs.version }}-macos-arm64.dmg
          if-no-files-found: error
          # Build artifacts are only needed long enough for the release job to
          # download them; the "Delete workflow artifacts" step removes them on
          # success, and this caps lingering ones (e.g. if a build succeeds but
          # the release job never runs) instead of the 90-day default.
          retention-days: 1

  build-windows:
    name: Build Windows installer (x64)
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: meta
        shell: pwsh
        run: |
          # On a tag push GITHUB_REF_NAME is the tag (e.g. v1.2.0). For a manual
          # run, prefer the `tag` input if given, else fall back to the pyproject
          # version. Strip any leading "v" so the version is bare (1.2.0).
          if ($env:GITHUB_EVENT_NAME -eq "push") {
            $raw = $env:GITHUB_REF_NAME
          } elseif ("${{ github.event.inputs.tag }}" -ne "") {
            $raw = "${{ github.event.inputs.tag }}"
          } else {
            $line = Select-String -Path pyproject.toml -Pattern '^version = "' | Select-Object -First 1
            $raw = $line.Line -replace '^version = "(.+)"', '$1'
          }
          $version = $raw -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Editable install first so copy_metadata("gleplot") in the spec finds
          # the dist-info. gui = PySide6; packaging = pyinstaller + Pillow.
          pip install -e ".[gui,packaging]"

      - name: Generate Windows icon (.ico)
        shell: pwsh
        run: python packaging/macos_icon.py --ico build/icons/gleplot.ico

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}\build\icons\gleplot.ico
        shell: pwsh
        run: pyinstaller --clean --noconfirm packaging/gleplot.spec

      - name: Smoke-test packaged app
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\gleplot\gleplot.exe")) {
            throw "Packaged executable not found at dist\\gleplot\\gleplot.exe"
          }
          & "dist\gleplot\gleplot.exe" --smoke-test

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build EXE installer
        shell: pwsh
        run: |
          # No OutputName override: the .iss defaults to
          # gleplot-{AppVersion}-windows-x64, giving dist\gleplot-<version>-windows-x64.exe.
          $version = "${{ steps.meta.outputs.version }}"
          $appDir = "$env:GITHUB_WORKSPACE\dist\gleplot"
          $iconFile = "$env:GITHUB_WORKSPACE\build\icons\gleplot.ico"
          $outputDir = "$env:GITHUB_WORKSPACE\dist"
          iscc `
            "/DAppVersion=$version" `
            "/DAppDir=$appDir" `
            "/DIconFile=$iconFile" `
            "/DOutputDir=$outputDir" `
            packaging\windows\gleplot.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: gleplot-windows-x64
          path: dist/gleplot-${{ steps.meta.outputs.version }}-windows-x64.exe
          if-no-files-found: error
          # Build artifacts are only needed long enough for the release job to
          # download them; the "Delete workflow artifacts" step removes them on
          # success, and this caps lingering ones (e.g. if a build succeeds but
          # the release job never runs) instead of the 90-day default.
          retention-days: 1

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    # Only publish a release on an actual tag push. A manual workflow_dispatch run
    # (which has no ref_name tag) builds and uploads artifacts but skips this job.
    if: github.event_name == 'push'
    needs:
      - build-macos-arm
      - build-windows
    permissions:
      actions: write
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # A hyphen in the tag (e.g. v1.3.0-rc.1) marks a pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Append the GLE prerequisite note to the auto-generated notes rather
          # than replacing them.
          append_body: true
          body: |
            ### Desktop builds

            These desktop builds require **GLE 4.3+** installed separately
            (https://github.com/vlabella/GLE/releases/latest) for live preview and
            compiled (PDF / PNG / EPS) export.

            The macOS build is **arm64** and **unsigned** — on first launch,
            right-click the app and choose **Open** to bypass Gatekeeper.
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe

      - name: Delete workflow artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner,
                repo,
                run_id,
                per_page: 100,
              },
            );

            for (const artifact of artifacts) {
              core.info(`Deleting artifact ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
