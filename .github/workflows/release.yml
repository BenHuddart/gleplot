name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Needed by the "Build and attach desktop installers" step, which dispatches
  # the release-binaries workflow via the GitHub API (gh workflow run).
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release
          
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v8.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Publish to GitHub Releases
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/upload-to-gh-release@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      # The tag semantic-release just pushed will NOT itself trigger the
      # tag-listening release-binaries workflow: GitHub deliberately does not
      # fire workflows from GITHUB_TOKEN-pushed tags (recursion guard). So kick
      # off the desktop-installer build explicitly here, passing the new tag as
      # the workflow_dispatch input (release-binaries attaches to that tag).
      # A workflow_dispatch invoked via the API *does* start a run, so no PAT is
      # needed. If this ever stops chaining, the workflow can still be run by
      # hand: `gh workflow run release-binaries.yml -f tag=<tag>`.
      - name: Build and attach desktop installers
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release-binaries.yml -f tag=${{ steps.release.outputs.tag }}
