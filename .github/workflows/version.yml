name: Semantic Versioning

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log analysis

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Detect manual version update
        id: manual_version
        run: |
          VERSION_CHANGED="false"

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            if git diff --name-only HEAD^ HEAD | grep -qE '^(pyproject.toml|src/gleplot/__init__.py)$'; then
              VERSION_CHANGED="true"
            fi
          fi

          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          with open(Path('pyproject.toml'), 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          PY
          )

          echo "changed=${VERSION_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run version bump script
        id: version
        if: steps.manual_version.outputs.changed != 'true'
        run: |
          cd ${{ github.workspace }}
          
          # Determine bump type
          if [ "${{ github.event.inputs.bump }}" != "" ] && [ "${{ github.event.inputs.bump }}" != "auto" ]; then
            BUMP_TYPE="--${{ github.event.inputs.bump }}"
          else
            BUMP_TYPE=""
          fi
          
          # Run script with appropriate flags
          python scripts/bump_version.py $BUMP_TYPE --dry-run > /tmp/version_output.txt 2>&1
          
          # Check if version was actually bumped
          if grep -q "No version bump needed" /tmp/version_output.txt; then
            echo "Version bump: none"
            exit 0
          fi
          
          # Run actual version bump
          python scripts/bump_version.py $BUMP_TYPE

      - name: Tag manual version update
        if: steps.manual_version.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.manual_version.outputs.version }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping"
            exit 0
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Manual version update tagged: ${TAG}"

      - name: Push version bump
        if: steps.manual_version.outputs.changed != 'true' && success()
        run: |
          # Check if there are changes to push
          if [ -n "$(git status --porcelain)" ]; then
            git push origin main --follow-tags
            echo "Version bump and tag pushed successfully"
          else
            echo "No changes to push"
          fi
